name: Deploy to GitHub Pages

on:
  workflow_dispatch:

# Required permissions for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  PYTHONUTF8: "1"
  FLET_CLI_NO_RICH_OUTPUT: "1"
  UV_PYTHON: "3.13"
  BUILD_VERSION: ${{ inputs.build_version || '1.1.0' }}
  BUILD_NUMBER: ${{ inputs.build_number || '2' }}

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python & uv
        uses: astral-sh/setup-uv@v6
        
      - name: Build Web App
        # Custom domain (akili.kiri.ng) = root base URL
        run: uv run flet build web --yes --project akili --product "Akili" --org ng.kiri --build-version ${{ env.BUILD_VERSION }} --build-number ${{ env.BUILD_NUMBER }} -v
        
      - name: Post-build patches
        run: |
          # CNAME for custom domain persistence
          echo "akili.kiri.ng" > build/web/CNAME
          
          # SEO: Add meta description to index.html
          sed -i 's|<meta name="description" content="">|<meta name="description" content="Akili — AI-powered learning platform. Personalized tutoring, curriculum generation, quizzes and mock exams for students.">|' build/web/index.html
          
          # SEO: Add Open Graph tags after <title>
          sed -i 's|</title>|</title>\n  <meta property="og:title" content="Akili" />\n  <meta property="og:description" content="Learn smarter with AI-powered tutoring, curriculum generation, and mock exams." />\n  <meta property="og:type" content="website" />\n  <meta property="og:url" content="https://akili.kiri.ng" />|' build/web/index.html
          
          # PWA: Fix manifest description
          sed -i 's|"description": ""|"description": "AI-powered learning platform for students"|' build/web/manifest.json
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/web'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
