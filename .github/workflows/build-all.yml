name: Build All Platforms

on:
  workflow_dispatch:
    inputs:
      build_version:
        description: "Build version (e.g. 1.0.0)"
        required: true
        default: "1.0.0"
      build_number:
        description: "Build number"
        required: true
        default: "1"

env:
  PYTHONUTF8: "1"
  FLET_CLI_NO_RICH_OUTPUT: "1"
  UV_PYTHON: "3.13"
  BUILD_VERSION: ${{ inputs.build_version || '1.0.0' }}
  BUILD_NUMBER: ${{ inputs.build_number || '1' }}

jobs:
  # ─── Android APK (universal) ───────────────────────────
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Build APK (universal)
        run: uv run flet build apk --yes --project akili --product "Akili" --org ng.kiri --build-version ${{ env.BUILD_VERSION }} --build-number ${{ env.BUILD_NUMBER }} -v
      - uses: actions/upload-artifact@v4
        with:
          name: apk-universal
          path: build/apk/

